<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="index.css/">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>Drum Machine</title>
  </head>
  <body>
    <script>

      // each key gets an "initial press" variable
      // it gets cycled based on keyup and keydown, to prevent multiple fires

      let keys = {
          "Q": ["Hat", true],
          "W": ["Clap", true],
          "E": ["Crash", true],
          "A": ["Snare", true],
          "S": ["Kick", true],
          "D": ["Cymbal", true],
          "Z": ["Tom", true],
          "X": ["Kick II", true],
          "C": ["Tom II", true]
        }

      function playSound(id, keyboard){
        let key = id.toUpperCase();

        if (!keys[key][1]){ return }
        $("#" + key)[0].load();
        $("#" + key)[0].play();
        $("#display").html(keys[key][0])

        if(keyboard){
          keys[key][1] = false;
          $("#pad-" + key).addClass("temp-hover")
        }

      }

      $(document).ready(function(){
        $(".pad").click(() => {
          playSound(event.target.innerText);
        });
        $(document).keydown(function(event){
          playSound(String.fromCharCode(event.which), true);
        })

        // on key up, remove hover class and set initial press indicator to true
        $(document).keyup(function(event){
          let key = String.fromCharCode(event.which);
          if (keys[key]){
            keys[key][1] = true;
            $("#pad-" + key).removeClass("temp-hover")
          }
        })

        }

        
      )
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="drum-machine">
      <h1 id="title">Drum Machine</h1>
      <div id="display">
        Display
      </div>

      <div id="pad-container">
        <div class="pad" id="pad-Q">
          <div class="pad-text">Q</div>
          <audio preload="auto" class="clip" id="Q" src="https://soundcamp.org/sounds/381/hat/A/2000s-snappy-hip-hop-foot-hi-hat-sound-a-key-25-nax.wav"></audio>
        </div>

        <div class="pad" id="pad-W">
          <div class="pad-text">W</div>
          <audio preload="auto" class="clip" id="W" src="https://soundcamp.org/sounds/381/clap/D/clap-single-shot-d-key-45-1D1.wav"></audio>
        </div>

        <div class="pad" id="pad-E">
          <div class="pad-text">E</div>
          <audio preload="auto" class="clip" id="E" src="https://soundcamp.org/sounds/381/crash/Fsharp/old-school-long-room-reverb-crash-one-shot-f-sharp-key-01-3h5.wav"></audio>
        </div>

        <div class="pad" id="pad-A">
          <div class="pad-text">A</div>
          <audio preload="auto" class="clip" id="A" src="https://soundcamp.org/sounds/381/snare/Fsharp/jazz-acoustic-snare-sample-f-sharp-key-52-n3u.wav"></audio>
        </div>

        <div class="pad" id="pad-S">
          <div class="pad-text">S</div>
          <audio preload="auto" class="clip" id="S" src="https://soundcamp.org/sounds/381/kick/Asharp/solid-trap-steel-kick-drum-sound-a-sharp-key-655-NVc.wav"></audio>
        </div>

        <div class="pad" id="pad-D">
          <div class="pad-text">D</div>
          <audio preload="auto" class="clip" id="D" src="https://soundcamp.org/sounds/381/ride/Fsharp/ride-cymbal-drum-sound-f-sharp-key-02-KmR.wav"></audio>
        </div>

        <div class="pad" id="pad-Z">
          <div class="pad-text">Z</div>
          <audio preload="auto" class="clip" id="Z" src="https://soundcamp.org/sounds/381/tom/Asharp/mid-tome-drum-sample-a-sharp-key-39-goa.wav"></audio>
        </div>

        <div class="pad" id="pad-X">
          <div class="pad-text">X</div>
          <audio preload="auto" class="clip" id="X" src="https://soundcamp.org/sounds/381/kick/A/subby-tr-909-synthetic-kick-a-key-607-PT8.wav"></audio>
        </div>

        <div class="pad" id="pad-C">
          <div class="pad-text">C</div>
          <audio preload="auto" class="clip" id="C" src="https://soundcamp.org/sounds/381/tom/E/short-reverb-tom-sample-e-key-24-Wqi.wav"></audio>
        </div>

      </div>

    <div id="footer">Drum Machine - <a href="https://www.freecodecamp.org/learn/front-end-development-libraries/front-end-development-libraries-projects/build-a-drum-machine">project from freeCodeCamp's curriculum</a><br/>by <a href="https://billybdev.com/">Billy Brown</a></div>
    
    </div>
  </body>
</html>
